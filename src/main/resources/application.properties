#--- MySql settings ---
spring.application.name=spotify-backend

#--- HTTPS use 8443 port ---
server.port=8443

spring.datasource.url=jdbc:mysql://localhost:3306/spotify_db
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#--- Mailtrap settings ---
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525

spring.mail.username=${MAILTRAP_USERNAME}
spring.mail.password=${MAILTRAP_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

#--- JWT Encryption ---
token.encryption.key=${AES_ENCRYPT_KEY}
token.expiration.ms=3600000

#--- File Upload Settings ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

file.upload-dir=uploads

# --- HTTPS CONFIGURATION ---
# Activate SSL
server.ssl.enabled=true

# Path to certificate (classpath means that is in resources folder)
server.ssl.key-store=classpath:spotify.p12

# password
server.ssl.key-store-password=${CERTIFICATE_PASSWORD}

# Type of certificate
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=spotify